name: Update Inaturalist Showcase

on:
  schedule:
    - cron: "0 0 * * 1"  # Every Monday
  workflow_dispatch:

concurrency:
  group: inaturalist-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Inaturalist update script
        run: python scripts/inaturalist_showcase_widget.py

      # Commit & push changes safely with soft reset
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Ensure local branch is at latest remote
          git fetch origin master
          git reset --soft origin/master

          # Stage README changes
          git add README.md

          # Exit if no changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # Commit staged changes
          git commit -m "Update Inaturalist Showcase"

          # Push to remote master
          git push origin master